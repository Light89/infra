---
# tasks file for gitlab_host

- name: Add GitLab CE repository
  ansible.builtin.shell:
    cmd: "set -o pipefail && curl -sS https://packages.gitlab.com/install/repositories/gitlab/gitlab-ce/script.deb.sh | bash"
    creates: /etc/apt/sources.list.d/gitlab_gitlab-ce.list
    executable: /bin/bash
  # noqa command-instead-of-module

- name: Install GitLab CE package
  ansible.builtin.apt:
    name: gitlab-ce
    state: present
    update_cache: true
  environment:
    GITLAB_ROOT_PASSWORD: "{{ gitlab_initial_root_password | default('') }}"

- name: Template GitLab configuration file
  ansible.builtin.template:
    src: gitlab.rb.j2
    dest: /etc/gitlab/gitlab.rb
    owner: root
    group: root
    mode: '0600'
  notify: Reconfigure GitLab

- name: Force handlers to run now so GitLab is fully up before executing rails runner
  ansible.builtin.meta: flush_handlers

- name: Harden GitLab security settings (Disable Public Sign-ups and Web IDE Fallback)
  ansible.builtin.command:
    cmd: >-
      gitlab-rails runner "
        settings = Gitlab::CurrentSettings.current_application_settings;
        changed = false;
        if settings.signup_enabled != false;
          settings.signup_enabled = false;
          changed = true;
        end;
        if settings.vscode_extension_marketplace_single_origin_fallback_enabled != false;
          settings.vscode_extension_marketplace_single_origin_fallback_enabled = false;
          changed = true;
        end;
        settings.save! if changed;
        puts changed ? 'changed' : 'ok';
      "
  register: gitlab_hardening
  changed_when: "'changed' in gitlab_hardening.stdout"
