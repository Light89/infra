---
- name: Apply Base Configuration
  hosts: all
  roles:
    - common
    - security_baseline

- name: Setup Docker Hosts
  hosts: docker_hosts
  roles:
    - docker_host

- name: Setup Utility Hosts
  hosts: utility_hosts
  roles:
    - utility_host

- name: Setup GitLab Host
  hosts: gitlab
  roles:
    - gitlab_host
# Note: Sensitive variables such as `gitlab_initial_root_password` and `smtp_password`
# should be injected via 1Password at runtime to prevent hardcoding secrets.
# Example: op run --env-file .env -- ansible-playbook ansible/playbooks/site.yml -i ansible/inventory/dev/hcloud.yml
